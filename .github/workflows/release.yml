# Generated from xtask::workflows::release
# Rebuild with `cargo xtask workflows`.
name: release
env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: '1'
on:
  push:
    tags:
    - v*-pre
jobs:
  bundle_mac_preview:
    if: github.repository_owner == 'nerdface-ai'
    runs-on: namespace-profile-mac-large
    env:
      SUPERZET_RELEASE_CHANNEL: preview
      SUPERZET_MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
      SUPERZET_MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      SUPERZET_APPLE_NOTARIZATION_KEY: ${{ secrets.APPLE_NOTARIZATION_KEY }}
      SUPERZET_APPLE_NOTARIZATION_KEY_ID: ${{ secrets.APPLE_NOTARIZATION_KEY_ID }}
      SUPERZET_APPLE_NOTARIZATION_ISSUER_ID: ${{ secrets.APPLE_NOTARIZATION_ISSUER_ID }}
      SUPERZET_MACOS_SIGNING_IDENTITY: ${{ vars.MACOS_SIGNING_IDENTITY }}
    steps:
    - name: steps::checkout_repo
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      with:
        clean: false
    - name: steps::setup_node
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
      with:
        node-version: '20'
    - name: steps::clear_target_dir_if_large
      run: ./script/clear-target-dir-if-larger-than 300
    - name: release::bundle_mac_preview
      run: ./script/bundle-mac aarch64-apple-darwin
    - name: '@actions/upload-artifact superzet-aarch64.dmg'
      uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
      with:
        name: superzet-aarch64.dmg
        path: target/aarch64-apple-darwin/release/superzet-aarch64.dmg
        if-no-files-found: error
    timeout-minutes: 90
  publish_preview_release:
    needs:
    - bundle_mac_preview
    if: github.repository_owner == 'nerdface-ai'
    runs-on: namespace-profile-2x4-ubuntu-2404
    steps:
    - name: release::download_workflow_artifacts
      uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53
      with:
        path: ./artifacts/
    - name: ls -lR ./artifacts
      run: ls -lR ./artifacts
    - name: release::publish_preview_release
      run: |
        mkdir -p release-artifacts
        cp "./artifacts/superzet-aarch64.dmg/superzet-aarch64.dmg" "release-artifacts/superzet-aarch64.dmg"
        shasum -a 256 "release-artifacts/superzet-aarch64.dmg" > "release-artifacts/sha256sums.txt"

        if ! gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --prerelease \
            --generate-notes
        fi

        gh release upload "$GITHUB_REF_NAME" \
          --repo "$GITHUB_REPOSITORY" \
          --clobber \
          release-artifacts/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    timeout-minutes: 30
concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.ref_name == 'main' && github.sha || 'anysha' }}
  cancel-in-progress: true
defaults:
  run:
    shell: bash -euxo pipefail {0}
