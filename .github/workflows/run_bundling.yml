# Generated from xtask::workflows::run_bundling
# Rebuild with `cargo xtask workflows`.
name: run_bundling
env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: '1'
on:
  pull_request:
    types:
    - labeled
    - synchronize
jobs:
  bundle_mac_aarch64:
    if: |-
      (github.event.action == 'labeled' && github.event.label.name == 'run-bundling') ||
      (github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'run-bundling'))
    runs-on: macos-latest
    steps:
    - name: steps::checkout_repo
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      with:
        clean: false
    - name: steps::setup_node
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
      with:
        node-version: '20'
    - name: steps::setup_sentry
      uses: matbour/setup-sentry-cli@3e938c54b3018bdd019973689ef984e033b0454b
      with:
        token: ${{ secrets.SENTRY_AUTH_TOKEN }}
    - name: steps::clear_target_dir_if_large
      run: ./script/clear-target-dir-if-larger-than 300
    - name: run_bundling::bundle_mac_aarch64
      run: ./script/bundle-mac aarch64-apple-darwin
    - name: '@actions/upload-artifact superzet-aarch64.dmg'
      uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
      with:
        name: superzet-aarch64.dmg
        path: target/aarch64-apple-darwin/release/superzet-aarch64.dmg
        if-no-files-found: error
    timeout-minutes: 60
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true
defaults:
  run:
    shell: bash -euxo pipefail {0}
