name: Report a bug
description: Report a problem with superzet.
type: Bug
labels: "state:needs triage"
body:
  - type: markdown
    attributes:
      value: |
        Before filing, please search existing issues: https://github.com/nerdface-ai/superzet/issues

        Feature request? Please use Discussions instead:
        https://github.com/nerdface-ai/superzet/discussions/new/choose
  - type: textarea
    attributes:
      label: Reproduction steps
      description: List the smallest set of steps needed to reproduce the problem from a clean launch.
      placeholder: |
        1. Start superzet
        2. Open a repository
        3. Click ...
    validations:
      required: true
  - type: textarea
    attributes:
      label: Current vs. expected behavior
      placeholder: |
        Current behavior:
        Expected behavior:
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: superzet version and system specs
      description: In the app, copy system specs from the command palette and paste them here.
      placeholder: |
        superzet: v0.1.0
        OS: macOS 15.3
        Memory: 36 GiB
        Architecture: aarch64
    validations:
      required: true
  - type: textarea
    attributes:
      label: Attach log output
      description: Open the app log from the command palette and paste the relevant lines here after redacting secrets.
      value: |
        <details><summary>superzet.log</summary>

        ```log

        ```

        </details>
    validations:
      required: false
  - type: textarea
    attributes:
      label: Relevant settings or keymap
      description: Paste any settings or key bindings that affect the bug.
      value: |
        <details><summary>settings / keymap</summary>

        ```json

        ```

        </details>
    validations:
      required: false
